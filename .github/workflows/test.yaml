on: [push, pull_request]
name: build
jobs:
  unit_test:
    if: (github.repository == 'kubernetes-sigs/cluster-api-provider-kubevirt')
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
    - name: Install Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 #v6.5.0
      with:
        go-version-file: go.mod
    - name: Test
      run: make test
    - name: Build
      run: make manager

  coverage:
    if: (github.repository == 'kubernetes-sigs/cluster-api-provider-kubevirt')
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
    - name: Install Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 #v6.5.0
      with:
        go-version-file: go.mod
    - name: Test with coverage
      env:
        TEST_ARGS: -covermode atomic -outputdir=./coverprofiles -coverprofile=cover.coverprofile
      run: |-
        mkdir -p coverprofiles
        make test
    - name: Push to coveralls.io
      continue-on-error: true
      env:
        COVERALLS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |-
        go install github.com/mattn/goveralls@latest
        $(go env GOPATH)/bin/goveralls -coverprofile=coverprofiles/cover.coverprofile -service=github

  go-linter:
    if: github.repository == 'kubernetes-sigs/cluster-api-provider-kubevirt'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
    - name: Install Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 #v6.5.0
      with:
        go-version-file: go.mod
    - name: golangci-lint
      uses: golangci/golangci-lint-action@d583c34f0599d37dbac4a198b9c83201be380893 #v9.3.0
      with:
        args: --timeout=5m -v
        version: v2.11.2

  check-gen:
    if: github.repository == 'kubernetes-sigs/cluster-api-provider-kubevirt'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
    - name: Install Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 #v6.5.0
      with:
        go-version-file: go.mod
    - name: Check that 'make generate' has being call
      run: make check-gen
